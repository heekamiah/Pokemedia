<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PokeMedia Creator</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* 🌌 BACKGROUND */
body{
    margin:0;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1e244a, #0b0f1f);
    color:white;
}

/* CONTAINER CENTRAL */
.container{
    max-width:1100px;
    margin:auto;
    padding:30px 20px;
}

/* HEADER */
h2{
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:20px;
}

/* TEXTAREA */
textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:14px;

    background:rgba(255,255,255,0.08);
    color:white;

    border:1px solid rgba(255,255,255,0.15);
    outline:none;
    backdrop-filter: blur(10px);
}

/* BUTTON GROUP */
.buttons{
    margin-top:10px;
}

/* BUTTONS */
button{
    padding:10px 14px;
    margin:5px 6px 0 0;

    border:none;
    border-radius:12px;
    cursor:pointer;

    font-weight:600;
    font-size:13px;

    background:linear-gradient(135deg,#6a5af9,#4f46e5);
    color:white;

    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* GRID */
.grid{
    display:flex;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

/* CARDS */
.card{
    width:300px;

    background:rgba(255,255,255,0.06);
    border-radius:18px;
    padding:18px;

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    backdrop-filter: blur(14px);

    transition:0.25s;
}

.card:hover{
    transform:translateY(-5px);
}

/* TITLE */
.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
}

/* TYPES */
.type{
    font-size:11px;
    padding:4px 10px;
    border-radius:8px;
    color:white;
    margin-right:5px;
    display:inline-block;
}

/* MOVES */
.move{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:10px;
    margin-bottom:7px;

    border-radius:10px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
}

.move-name{
    font-size:14px;
}

/* BADGE */
.badge{
    font-size:11px;
    padding:4px 10px;
    border-radius:8px;
    color:white;
}

/* ABILITY */
.ability{
    padding:12px;
    border-radius:12px;
}

.ability-desc{
    font-size:12px;
    margin-top:10px;
    color:#eaeaea;
    line-height:1.4;
}

/* STATS */
.stat{
    margin-bottom:14px;
    font-size:12px;
}

.slider{
    height:8px;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    position:relative;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    border-radius:10px;
}

.knob{
    position:absolute;
    top:50%;
    transform:translate(-50%,-50%);
    width:12px;
    height:12px;
    background:white;
    border:2px solid #22c55e;
    border-radius:50%;
}

/* EXPORT */
.exporting{
    background:#0b0f1f !important;
}

.exporting .card{
    background:#141a2e !important;
}

.exporting .ability-desc{
    color:#f2f2f2 !important;
}

/* TYPE COLORS */
.fire{background:#ff7043;}
.water{background:#42a5f5;}
.grass{background:#66bb6a;}
.electric{background:#fdd835;color:#000;}
.psychic{background:#ec407a;}
.ice{background:#4dd0e1;}
.dragon{background:#5c6bc0;}
.dark{background:#5d4037;}
.fairy{background:#f48fb1;}
.fighting{background:#ef5350;}
.ground{background:#8d6e63;}
.rock{background:#bca36b;}
.ghost{background:#7e57c2;}
.bug{background:#9ccc65;}
.normal{background:#9e9e9e;}
</style>
</head>

<body>

<div class="container">

<h2>Pokémon Builder FINAL</h2>

<textarea id="input"></textarea>

<div class="buttons">
<button onclick="generar()">Generar</button>
<button onclick="exportar('movesCard')">Moves PNG</button>
<button onclick="exportar('abilityCard')">Ability PNG</button>
<button onclick="exportar('statsCard')">Stats PNG</button>
</div>

<div class="grid">
<div class="card" id="movesCard"></div>
<div class="card" id="abilityCard"></div>
<div class="card" id="statsCard"></div>
</div>

</div>

<!-- ⚠️ JS EXACTO (NO CAMBIADO) -->
<script>
/* TODO tu JS se queda igual */
const moveCache={};
const abilityCache={};

async function getMoveType(move){
let key=move.toLowerCase().trim();
if(moveCache[key]) return moveCache[key];
try{
 let clean=key.replace(/ /g,"-").replace(/'/g,"");
 let res=await fetch(`https://pokeapi.co/api/v2/move/${clean}`);
 if(!res.ok) return "normal";
 let data=await res.json();
 return data.type.name;
}catch{return "normal";}
}

async function getPokemonTypes(name){
try{
 let res=await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase()}`);
 let data=await res.json();
 return data.types.map(t=>t.type.name);
}catch{return ["normal"];}
}

async function getAbilityDesc(name){
try{
 let res=await fetch(`https://pokeapi.co/api/v2/ability/${name.toLowerCase()}`);
 let data=await res.json();
 let entry=data.effect_entries.find(e=>e.language.name==="en");
 return entry?entry.effect:"Sin descripción.";
}catch{return "Sin descripción.";}
}

function getTypeColor(type){
const colors={fire:"#ff7043",water:"#42a5f5",grass:"#66bb6a",electric:"#fdd835",psychic:"#ec407a",ice:"#4dd0e1",dragon:"#5c6bc0",dark:"#5d4037",fairy:"#f48fb1",fighting:"#ef5350",ground:"#8d6e63",rock:"#bca36b",ghost:"#7e57c2",bug:"#9ccc65",normal:"#9e9e9e"};
return colors[type]||"#777";
}

async function generar(){
let txt=document.getElementById("input").value.split("\n");
let name=txt[0].split("@")[0].trim();
let item=txt[0].split("@")[1];
let ability="",nature="";
let moves=[];
let stats={HP:0,Atk:0,Def:0,SpA:0,SpD:0,Spe:0};

txt.forEach(l=>{
 if(l.includes("Ability")) ability=l.split(":")[1].trim();
 if(l.includes("Nature")) nature=l.replace("Nature","").trim();
 if(l.includes("EVs")){
  l.split(":")[1].split("/").forEach(p=>{
   let v=parseInt(p);
   if(p.includes("HP")) stats.HP=v;
   if(p.includes("Atk")) stats.Atk=v;
   if(p.includes("Def")) stats.Def=v;
   if(p.includes("SpA")) stats.SpA=v;
   if(p.includes("SpD")) stats.SpD=v;
   if(p.includes("Spe")) stats.Spe=v;
  });
 }
 if(l.startsWith("-")) moves.push(l.replace("-","").trim());
});

let types=await getPokemonTypes(name);
let typesHTML=types.map(t=>`<span class="type ${t}">${t.toUpperCase()}</span>`).join("");

let movesHTML="";
for(let m of moves){
let type=await getMoveType(m);
movesHTML+=`<div class="move"><div class="move-name">${m}</div><div class="badge ${type}">${type.toUpperCase()}</div></div>`;
}

document.getElementById("movesCard").innerHTML=`<div class="title">${name}</div><div style="margin-bottom:10px">${typesHTML}</div>${movesHTML}`;

let desc=await getAbilityDesc(ability);
let color=getTypeColor(types[0]);

document.getElementById("abilityCard").innerHTML=`<div class="title">${name}</div><div class="ability" style="background:${color}22;border:1px solid ${color}"><b>Ability:</b> ${ability}<br><b>Item:</b> ${item}<br><b>Nature:</b> ${nature}</div><div class="ability-desc">${desc}</div>`;

document.getElementById("statsCard").innerHTML=`<div class="title">${name}</div><br>${stat("HP",stats.HP)}${stat("Atk",stats.Atk)}${stat("Def",stats.Def)}${stat("SpA",stats.SpA)}${stat("SpD",stats.SpD)}${stat("Spe",stats.Spe)}`;
}

function stat(n,v){
let p=(v/252)*100;
return `<div class="stat"><div>${n}: ${v}</div><div class="slider"><div class="fill" style="width:${p}%"></div><div class="knob" style="left:${p}%"></div></div></div>`;
}

function exportar(id){
let el=document.getElementById(id);
el.classList.add("exporting");
html2canvas(el,{scale:3}).then(c=>{
 let a=document.createElement("a");
 a.download=id+".png";
 a.href=c.toDataURL();
 a.click();
 el.classList.remove("exporting");
});
}
</script>

</body>
</html>
